# 所有 Prompt 集中管理，方便调整而无需修改代码

# ── 单图单轮标注 ───────────────────────────────────────────────────────────────
image_single: |
  你是专业的多模态数据标注专家。对图片进行分析，输出JSON，不要输出任何其他内容。

  {
    "caption": {
      "one_sentence": "一句话描述，≤25字，客观准确",
      "detailed": "详细描述，150-250字，依次覆盖：主体→位置→状态→背景→整体氛围，不要推测图片外的信息"
    },
    "qa_pairs": [
      {"q": "关于图中可见物体的问题",             "a": "准确答案", "type": "perception"},
      {"q": "关于数量的问题（如有可数物体）",       "a": "具体数字+说明", "type": "counting"},
      {"q": "关于空间位置关系的问题",              "a": "方位描述", "type": "spatial"},
      {"q": "关于颜色/纹理/形状等属性的问题",      "a": "具体属性", "type": "attribute"},
      {"q": "需要结合图片内容做推理的问题",         "a": "推理依据+结论", "type": "reasoning"}
    ],
    "ocr": "图中所有文字（无文字则填null）",
    "tags": ["图片主题标签，3-5个"]
  }

  注意：
  - 回答只描述图片中可以直接看到的内容
  - 如果某类问题不适用（如图中没有可数物体），跳过该qa_pair
  - 不要捏造图片中不存在的内容
  - 只输出JSON，不要有其他内容

# ── 单图多轮对话 ───────────────────────────────────────────────────────────────
image_multi_template: |
  基于图片，生成一段{style}风格的多轮对话。

  对话要求：
  - 4-5轮，第一轮含<image>，后续不含
  - 追问自然口语化，有清晰递进逻辑
  - 至少1轮需要推理才能回答
  - {style_hint}

  仅输出JSON：
  {{"turns": [
    {{"role": "user", "content": "...（含<image>）"}},
    {{"role": "assistant", "content": "..."}},
    {{"role": "user", "content": "...（不含<image>）"}},
    {{"role": "assistant", "content": "..."}}
  ]}}

# 三种对话风格
multiturn_styles:
  - style: "探究"
    style_hint: "用户充满好奇心，从整体到细节逐层追问，像第一次看到这张图"
  - style: "任务导向"
    style_hint: "用户有明确目的（想买/想去/想了解），问题围绕判断/决策/比较"
  - style: "知识扩展"
    style_hint: "用户从图片出发，追问相关背景知识和专业信息"

# ── 多图对比 ───────────────────────────────────────────────────────────────────
multi_image: |
  我提供了两张图片（图A和图B），请生成对比分析数据。
  仅输出JSON，不含其他内容：

  {
    "desc_a": "图A简要描述（50字内）",
    "desc_b": "图B简要描述（50字内）",
    "compare_qa": [
      {"q": "关于两图直接差异的问题，用左图/右图指代", "a": "准确回答"},
      {"q": "关于两图共同点的问题",                   "a": "准确回答"},
      {"q": "需要综合判断的问题",                     "a": "综合分析"}
    ],
    "individual_qa": [
      {"q": "只关于图A的问题，用'第一张图'或'左图'指代", "a": "关于图A的回答"},
      {"q": "只关于图B的问题，用'第二张图'或'右图'指代", "a": "关于图B的回答"}
    ]
  }

# ── 视频帧标注 ─────────────────────────────────────────────────────────────────
video: |
  以下是一段视频均匀采样的 {N} 帧，按时间先后顺序排列（帧1最早，帧N最晚）。

  请基于这些帧生成视频理解训练数据，输出JSON，不含其他内容：

  {
    "event_summary": "视频事件的完整描述（100-150字），包含：发生了什么→怎么发展→结果如何",
    "qa_pairs": [
      {"q": "关于视频整体内容的问题",                 "a": "准确回答", "type": "summary"},
      {"q": "关于某个具体动作或状态的问题",           "a": "准确回答", "type": "action"},
      {"q": "关于时序/先后顺序的问题",               "a": "准确回答", "type": "temporal"},
      {"q": "关于视频中某一帧的具体问题（指明帧编号）","a": "准确回答", "type": "frame_specific"},
      {"q": "需要结合多帧信息推理的问题",             "a": "推理+回答", "type": "reasoning"}
    ],
    "reorder_task": {
      "prompt": "以下4帧（来自视频中间段）顺序被打乱，请按时间先后排列",
      "correct_order": "如：帧C→帧A→帧D→帧B",
      "explanation": "排序依据"
    }
  }

# ── 音频情感/意图理解 ──────────────────────────────────────────────────────────
audio_understanding: |
  以下是一段语音的转录文本：
  "{transcript}"

  请分析说话人的状态并输出JSON，不含其他内容：
  {{
    "emotion": "平静/高兴/悲伤/愤怒/困惑/急迫（选一个最匹配的）",
    "intent":  "提问/陈述/请求/抱怨/确认（选一个最匹配的）",
    "formality": "正式/口语/方言",
    "response": "AI应该如何回应这句话（50-100字，有帮助的实质性回复）"
  }}
  只输出JSON。
